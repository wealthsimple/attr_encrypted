name: Default

# This workflow runs on all pushes to the repo so we can test changes and provide
# fast feedback.
on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight_check:
    name: Preflight Check
    runs-on: ubuntu-latest
    # do a matrix for ACTIVERECORD_VERSION of 7.2 and 8.1
    strategy:
      matrix:
        activerecord_version:
          - 7.2
          - 8.1
    steps:
      # Need to fetch all refs, so we can check if the version has been bumped
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1.308.0
        with:
          bundler-cache: true
        env:
          ACTIVERECORD: ${{ matrix.activerecord_version }}

      - name: Test
        run: bundle exec rake
        env:
          ACTIVERECORD: ${{ matrix.activerecord_version }}